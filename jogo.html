<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cariótipo MYX - Jogo da Memória</title>
   <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body class="pagina-jogo">
    <header>
    <a href="index.html" class="btn-inicio" title="Voltar ao início">🏠 Início</a>
    <h1>🧬 Cariótipo MYX</h1>
    <button class="btn-reiniciar" onclick="reiniciarJogo()">🔄 Nova Partida</button>
</header>

    <main class="area-jogo">
        <div class="grade-cartas" id="gradeCartas"></div>
        <aside class="painel-lateral" id="painelLateral">
            <div class="info-pares">
                <span class="icone">🧩</span>
                <span>Pares encontrados:</span>
                <span id="contadorPares">0 / 23</span>
            </div>
            <div class="cariotipo-final" id="cariotipoFinal" style="display: none;">
                <h2>Cariótipo completo</h2>
                <div class="pares-ordenados" id="paresOrdenados"></div>
                <p class="mensagem-parabens">🎉 Parabéns! Você montou o cariótipo!</p>
            </div>
        </aside>
    </main>

    <footer class="rodape">
        <p>Plataforma desenvolvida por <strong>Gabriel Alves</strong> | <a href="https://panoramaedu.onrender.com/" target="_blank" rel="noopener noreferrer">Panorama Educação</a></p>
        <p class="rodape-doacao">Ajude a manter essa ferramenta! <a href="https://exemplo.com/doar" target="_blank" rel="noopener noreferrer" class="link-doacao">Faça uma doação!</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
